<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Icon -->
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

  <!-- Title -->  
  <title>Password Generator App</title>

  <!-- Styles -->
  <link rel="stylesheet" href="./css/styles.css">

  <!-- Family Font -->
  <link rel="preload" href="./assets/fonts/static/JetBrainsMono-Bold.ttf" type="font/ttf" as="font" crossorigin>

</head>
<body>

  <main class="app">
    <h1 class="app__heading text-preset-4">Password Generator</h1>

    <form class="generator">
      <div>

        <button aria-label="Copy text">
          <img src="./assets/images/icon-copy.svg" alt="">
        </button>

        <output>P4$5W0rD!</output>
      </div>

      <div>
        <div>
          <div>
            <div>
              <div>
                <label for="characterLength">Character Length</label>

                <p>0</p>
              </div>
                <input type="range" min="0" max="15" value="0" id="characterLength">
            </div>
          </div>

          <fieldset>

            <legend>Character options</legend>
            <div>
              <input type="checkbox" id="uppercaseLetters" name="uppercaseLetters">
              <label for="uppercaseLetters">Include Uppercase Letters</label>
            </div>

            <div>
              <input type="checkbox" id="lowercaseLetters" name="lowercaseLetters">
              <label for="lowercaseLetters">Include Lowercase Letters</label>
            </div>

            <div>
              <input type="checkbox" id="numbers" name="numbers">
              <label for="numbers">Include Numbers</label>
            </div>

            <div>
              <input type="checkbox" id="symbols" name="symbols">
              <label for="symbols">Include Symbols</label>
            </div>
          </fieldset>

          <div>
            <div>
              <p>Strength</p>

              <div>
                <div></div>

                <div></div>

                <div></div>

                <div></div>
              </div>
            </div>

            <button type="button">
              Generate
              <img src="./assets/images/icon-arrow-right.svg" alt="">
            </button>
          </div>
        </div>
      </div>
    </form>
  </main>

</body>
</html>

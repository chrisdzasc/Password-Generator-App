<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Icon -->
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

  <!-- Title -->  
  <title>Password Generator App</title>

  <!-- Styles -->
  <link rel="stylesheet" href="./css/styles.css">

  <!-- Family Font -->
  <link rel="preload" href="./assets/fonts/static/JetBrainsMono-Bold.ttf" type="font/ttf" as="font" crossorigin>

</head>
<body>

  <main class="app">
    <h1 class="app__heading text-preset-4">Password Generator</h1>

    <form class="generator">
      <div class="password">

        <output class="password__text text-preset-2">P4$5W0rD!</output>

        <button class="password__button" aria-label="Copy text">
          <img class="password__copy" src="./assets/images/icon-copy.svg" alt="">
        </button>

      </div>

      <div class="configurator">
        <div class="characters">
          <div class="characters__info">
            <label class="characters__label text-preset-4" for="characterLength">Character Length</label>

            <p class="characters__count text-preset-2">0</p>
          </div>

          <input class="characters__range" type="range" min="0" max="15" value="0" id="characterLength">
        </div>

        <fieldset>

          <legend>Character options</legend>
          <div>
            <input type="checkbox" id="uppercaseLetters" name="uppercaseLetters">
            <label for="uppercaseLetters">Include Uppercase Letters</label>
          </div>

          <div>
            <input type="checkbox" id="lowercaseLetters" name="lowercaseLetters">
            <label for="lowercaseLetters">Include Lowercase Letters</label>
          </div>

          <div>
            <input type="checkbox" id="numbers" name="numbers">
            <label for="numbers">Include Numbers</label>
          </div>

          <div>
            <input type="checkbox" id="symbols" name="symbols">
            <label for="symbols">Include Symbols</label>
          </div>
        </fieldset>

        <div>
          <div>
            <p>Strength</p>

            <div>
              <div></div>

              <div></div>

              <div></div>

              <div></div>
            </div>
          </div>

          <button type="button">
            Generate
            <img src="./assets/images/icon-arrow-right.svg" alt="">
          </button>
        </div>
      </div>
    </form>
  </main>

</body>
</html>
